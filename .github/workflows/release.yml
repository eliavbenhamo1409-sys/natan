name: Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Sharp Windows binary
        run: npm install @img/sharp-win32-x64 --save-optional --force

      - name: Setup Prisma
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Prepare standalone
        run: node electron/build-standalone.js

      - name: Create config from secrets
        run: node electron/create-config.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build Electron (portable)
        run: npx electron-builder --win --config electron-builder.publish.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
